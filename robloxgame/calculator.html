<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YASH STUDIO — Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080b10;
    --panel: #0d1117;
    --panel2: #0f1419;
    --border: #1a2a1a;
    --green: #00ff88;
    --green2: #00cc6a;
    --yellow: #ffd700;
    --red: #ff4455;
    --blue: #00cfff;
    --text: #c8ffd8;
    --muted: #4a7a5a;
    --font-mono: 'Share Tech Mono', monospace;
    --font-hud: 'Orbitron', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 15% 0%, rgba(0,255,136,0.07) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 90%, rgba(0,207,255,0.04) 0%, transparent 55%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,255,136,0.025) 39px, rgba(0,255,136,0.025) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,255,136,0.025) 39px, rgba(0,255,136,0.025) 40px);
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  nav {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 40px;
    background: rgba(8,11,16,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .nav-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
  .nav-icon {
    width: 36px; height: 36px;
    background: var(--green); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-hud); font-weight: 900; font-size: 14px; color: #000;
    box-shadow: 0 0 16px rgba(0,255,136,0.45);
  }
  .nav-title { font-family: var(--font-hud); font-size: 14px; font-weight: 700; letter-spacing: 3px; color: var(--green); }
  .nav-sub { font-size: 9px; color: var(--muted); letter-spacing: 2px; }

  .nav-links { display: flex; gap: 6px; }
  .nav-link {
    font-family: var(--font-hud); font-size: 9px; letter-spacing: 2px;
    color: var(--muted); padding: 7px 14px; border-radius: 4px;
    cursor: pointer; transition: all 0.2s; border: 1px solid transparent;
    text-decoration: none;
  }
  .nav-link:hover, .nav-link.active { color: var(--green); border-color: rgba(0,255,136,0.2); background: rgba(0,255,136,0.06); }

  .nav-rate {
    display: flex; align-items: center; gap: 8px;
    font-size: 10px; color: var(--muted);
  }
  .nav-rate strong { color: var(--green); font-size: 12px; }
  .pulse-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.25;} }

  .page { max-width: 1200px; margin: 0 auto; padding: 36px 24px 80px; }

  .sec-head {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 20px;
  }
  .sec-head-line { flex: 1; height: 1px; background: var(--border); }
  .sec-label {
    font-family: var(--font-hud); font-size: 9px;
    letter-spacing: 4px; color: var(--muted);
    white-space: nowrap;
  }

  .converter-panel {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 28px;
    display: grid; grid-template-columns: 1fr auto 1fr;
    gap: 20px; align-items: center;
  }
  .conv-field { display: flex; flex-direction: column; gap: 8px; }
  .conv-field label { font-size: 9px; letter-spacing: 2px; color: var(--muted); }
  .conv-field input {
    background: #0a0f0a; border: 1px solid var(--border);
    border-radius: 8px; color: var(--green);
    font-family: var(--font-hud); font-size: 22px; font-weight: 700;
    padding: 14px 18px; width: 100%; outline: none;
    transition: border-color 0.2s;
  }
  .conv-field input:focus { border-color: var(--green); }
  .conv-hint { font-size: 9px; color: var(--muted); }
  .conv-arrow {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    color: var(--green); font-size: 22px;
  }
  .conv-arrow small { font-size: 8px; color: var(--muted); letter-spacing: 1px; text-align: center; line-height: 1.6; }
  .conv-result-panel {
    background: #0a0f0a; border: 1px solid var(--green);
    border-radius: 8px; padding: 14px 18px;
    box-shadow: 0 0 20px rgba(0,255,136,0.08);
  }
  .conv-result-label { font-size: 9px; color: var(--muted); letter-spacing: 2px; margin-bottom: 6px; }
  .conv-result-value {
    font-family: var(--font-hud); font-size: 26px; font-weight: 700;
    color: var(--yellow); text-shadow: 0 0 12px rgba(255,215,0,0.25);
  }
  .conv-formula { font-size: 9px; color: var(--muted); margin-top: 6px; }

  footer {
    text-align:center; padding:24px;
    font-size:9px; color:var(--muted); letter-spacing:2px;
    border-top:1px solid var(--border);
  }

  @media(max-width:768px){
    nav { padding:12px 16px; }
    .nav-links { display:none; }
    .page { padding:20px 14px 60px; }
    .converter-panel { grid-template-columns:1fr; }
    .conv-arrow { transform:rotate(90deg); }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html">
    <div class="nav-icon">YS</div>
    <div>
      <div class="nav-title">YASH STUDIO</div>
      <div class="nav-sub">ROBUX CALCULATOR</div>
    </div>
  </a>
  <div class="nav-links">
    <a class="nav-link" href="ccu.html">LIVE CCU</a>
    <a class="nav-link active" href="calculator.html">CALCULATOR</a>
    <a class="nav-link" href="dashboard.html">DASHBOARD</a>
  </div>
  <div class="nav-rate">
    <div class="pulse-dot"></div>
    <span>1 USD = <strong id="nav-rate">—</strong> INR</span>
  </div>
</nav>

<div class="page">
  <section id="converter">
    <div class="sec-head">
      <div class="sec-label">ROBUX → INR CONVERTER</div>
      <div class="sec-head-line"></div>
    </div>
    <div class="converter-panel">
      <div class="conv-field">
        <label>ROBUX AMOUNT</label>
        <input id="conv-in" type="number" min="0" placeholder="0" oninput="doConvert()">
        <div class="conv-hint">Type any Robux amount</div>
      </div>
      <div class="conv-arrow">
        →
        <small>× 0.0038<br>× USD/INR</small>
      </div>
      <div class="conv-field">
        <label>RESULT</label>
        <div class="conv-result-panel">
          <div class="conv-result-label">INDIAN RUPEES (₹)</div>
          <div class="conv-result-value" id="conv-out">₹ 0</div>
          <div class="conv-formula" id="conv-formula">0 × 0.0038 × <span id="conv-rate-disp">—</span> USD/INR</div>
        </div>
      </div>
    </div>
  </section>
</div>

<footer>YASH STUDIO — ROBUX CALCULATOR &nbsp;·&nbsp; LIVE EXCHANGE RATES</footer>

<script>
var ROBUX_RATE = 0.0038;
var usdToInr = null;

window.onload = function() {
  fetchRate();
};

function fetchRate() {
  fetch('https://api.exchangerate-api.com/v4/latest/USD')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      usdToInr = d.rates.INR;
      document.getElementById('nav-rate').textContent = usdToInr.toFixed(2);
      document.getElementById('conv-rate-disp').textContent = usdToInr.toFixed(2);
    })
    .catch(function() {
      usdToInr = 83.5;
      document.getElementById('nav-rate').textContent = '83.50*';
      document.getElementById('conv-rate-disp').textContent = '83.50*';
    });
}

function doConvert() {
  var v = parseFloat(document.getElementById('conv-in').value) || 0;
  var r = v * ROBUX_RATE * (usdToInr || 83.5);
  document.getElementById('conv-out').textContent = '₹ ' + fmt(r);
  document.getElementById('conv-formula').innerHTML =
    fmt(v) + ' × 0.0038 × <span id="conv-rate-disp">' + (usdToInr || 83.5).toFixed(2) + '</span> USD/INR';
}

function fmt(n) { return new Intl.NumberFormat('en-IN').format(Math.round(n)); }
</script>
</body>
</html>
