<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YASH STUDIO — Live CCU</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080b10;
    --panel: #0d1117;
    --panel2: #0f1419;
    --border: #1a2a1a;
    --green: #00ff88;
    --green2: #00cc6a;
    --yellow: #ffd700;
    --red: #ff4455;
    --blue: #00cfff;
    --text: #c8ffd8;
    --muted: #4a7a5a;
    --font-mono: 'Share Tech Mono', monospace;
    --font-hud: 'Orbitron', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 15% 0%, rgba(0,255,136,0.07) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 90%, rgba(0,207,255,0.04) 0%, transparent 55%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,255,136,0.025) 39px, rgba(0,255,136,0.025) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,255,136,0.025) 39px, rgba(0,255,136,0.025) 40px);
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  nav {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 40px;
    background: rgba(8,11,16,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .nav-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
  .nav-icon {
    width: 36px; height: 36px;
    background: var(--green); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-hud); font-weight: 900; font-size: 14px; color: #000;
    box-shadow: 0 0 16px rgba(0,255,136,0.45);
  }
  .nav-title { font-family: var(--font-hud); font-size: 14px; font-weight: 700; letter-spacing: 3px; color: var(--green); }
  .nav-sub { font-size: 9px; color: var(--muted); letter-spacing: 2px; }

  .nav-links { display: flex; gap: 6px; }
  .nav-link {
    font-family: var(--font-hud); font-size: 9px; letter-spacing: 2px;
    color: var(--muted); padding: 7px 14px; border-radius: 4px;
    cursor: pointer; transition: all 0.2s; border: 1px solid transparent;
    text-decoration: none;
  }
  .nav-link:hover, .nav-link.active { color: var(--green); border-color: rgba(0,255,136,0.2); background: rgba(0,255,136,0.06); }

  .page { max-width: 1200px; margin: 0 auto; padding: 36px 24px 80px; }

  .sec-head {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 20px;
  }
  .sec-head-line { flex: 1; height: 1px; background: var(--border); }
  .sec-label {
    font-family: var(--font-hud); font-size: 9px;
    letter-spacing: 4px; color: var(--muted);
    white-space: nowrap;
  }
  .sec-badge {
    font-size: 9px; color: var(--green);
    background: rgba(0,255,136,0.08);
    border: 1px solid rgba(0,255,136,0.2);
    border-radius: 10px; padding: 2px 10px;
    letter-spacing: 1px;
  }

  .ccu-total-card {
    background: var(--panel);
    border: 1px solid rgba(0,255,136,0.25);
    border-radius: 14px; padding: 24px 32px;
    margin-bottom: 20px;
    display: flex; align-items: center; justify-content: space-between;
    position: relative; overflow: hidden;
    box-shadow: 0 0 40px rgba(0,255,136,0.06);
  }
  .ccu-total-card::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
  }
  .ccu-total-label { font-size: 9px; letter-spacing: 3px; color: var(--muted); margin-bottom: 8px; }
  .ccu-total-value {
    font-family: var(--font-hud); font-size: 48px; font-weight: 900;
    color: var(--green); line-height: 1;
    text-shadow: 0 0 30px rgba(0,255,136,0.4);
  }
  .ccu-total-sub { font-size: 10px; color: var(--muted); margin-top: 6px; }
  .ccu-refresh-btn {
    font-family: var(--font-hud); font-size: 9px; letter-spacing: 2px;
    color: var(--green); background: rgba(0,255,136,0.08);
    border: 1px solid rgba(0,255,136,0.2); border-radius: 6px;
    padding: 8px 16px; cursor: pointer; transition: all 0.2s;
  }
  .ccu-refresh-btn:hover { background: rgba(0,255,136,0.15); }
  .ccu-refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .ccu-updated { font-size: 9px; color: var(--muted); margin-top: 8px; letter-spacing: 1px; }

  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }

  .game-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 18px;
    transition: border-color 0.2s, transform 0.2s;
    position: relative; overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  .game-card:hover { border-color: rgba(0,255,136,0.3); transform: translateY(-2px); }

  .game-rank {
    position: absolute; top: 10px; right: 10px;
    font-family: var(--font-hud); font-size: 20px; font-weight: 900;
    color: var(--green); opacity: 0.25;
    line-height: 1;
  }
  .game-rank.top3 { opacity: 0.6; color: var(--yellow); }

  .game-thumb {
    width: 100%; height: 120px;
    border-radius: 8px; object-fit: cover;
    background: #0a1a0a;
    margin-bottom: 12px; display: block;
  }
  .game-thumb-placeholder {
    width: 100%; height: 120px;
    border-radius: 8px; background: #0a1a0a;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 28px;
    margin-bottom: 12px;
  }

  .game-name {
    font-family: var(--font-hud); font-size: 11px;
    font-weight: 700; color: var(--text);
    letter-spacing: 1px; margin-bottom: 10px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .game-stats { display: flex; gap: 10px; flex-wrap: wrap; }
  .game-stat {
    display: flex; flex-direction: column;
    gap: 2px; flex: 1; min-width: 70px;
  }
  .game-stat-label { font-size: 8px; letter-spacing: 1.5px; color: var(--muted); }
  .game-stat-val {
    font-family: var(--font-hud); font-size: 16px; font-weight: 700;
    color: var(--green);
  }
  .game-stat-val.blue { color: var(--blue); }
  .game-stat-val.yellow { color: var(--yellow); }

  .game-ccu-bar {
    margin-top: 12px; height: 3px;
    background: var(--border); border-radius: 2px; overflow: hidden;
  }
  .game-ccu-fill {
    height: 100%; background: var(--green);
    border-radius: 2px; transition: width 0.8s ease;
    box-shadow: 0 0 8px rgba(0,255,136,0.4);
  }

  .game-loading {
    display: flex; align-items: center; justify-content: center;
    height: 80px; color: var(--muted); font-size: 11px; letter-spacing: 2px;
  }
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid var(--border); border-top-color: var(--green);
    border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .ccu-error {
    text-align: center; padding: 40px; color: var(--muted);
    font-size: 11px; letter-spacing: 2px;
    border: 1px dashed var(--border); border-radius: 12px;
  }
  .ccu-error span { color: var(--red); display: block; margin-bottom: 8px; font-size: 20px; }

  footer {
    text-align:center; padding:24px;
    font-size:9px; color:var(--muted); letter-spacing:2px;
    border-top:1px solid var(--border);
  }

  @media(max-width:768px){
    nav { padding:12px 16px; }
    .nav-links { display:none; }
    .page { padding:20px 14px 60px; }
    .ccu-total-card { flex-direction:column; gap:16px; text-align:center; }
    .ccu-total-right { text-align:center; }
    .ccu-total-value { font-size:36px; }
    .games-grid { grid-template-columns:1fr 1fr; }
  }
  @media(max-width:480px){
    .games-grid { grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html">
    <div class="nav-icon">YS</div>
    <div>
      <div class="nav-title">YASH STUDIO</div>
      <div class="nav-sub">LIVE CCU TRACKER</div>
    </div>
  </a>
  <div class="nav-links">
    <a class="nav-link active" href="ccu.html">LIVE CCU</a>
    <a class="nav-link" href="calculator.html">CALCULATOR</a>
    <a class="nav-link" href="dashboard.html">DASHBOARD</a>
  </div>
</nav>

<div class="page">
  <section id="ccu">
    <div class="sec-head">
      <div class="sec-label">LIVE CONCURRENT USERS</div>
      <div class="sec-head-line"></div>
      <div class="sec-badge" id="ccu-game-count">LOADING</div>
    </div>

    <div class="ccu-total-card">
      <div class="ccu-total-left">
        <div class="ccu-total-label">TOTAL CCU ACROSS ALL GAMES</div>
        <div class="ccu-total-value" id="total-ccu">—</div>
        <div class="ccu-total-sub">Players online right now — sorted by CCU rank</div>
      </div>
      <div class="ccu-total-right">
        <button class="ccu-refresh-btn" id="refresh-btn" onclick="loadCCU()">&#8635; REFRESH</button>
        <div class="ccu-updated" id="ccu-updated">Last updated: —</div>
      </div>
    </div>

    <div class="games-grid" id="games-grid">
      <div class="game-card">
        <div class="game-loading"><span class="spinner"></span> FETCHING GAMES...</div>
      </div>
    </div>
  </section>
</div>

<footer>YASH STUDIO — LIVE CCU &nbsp;·&nbsp; GAMES RANKED BY CONCURRENT USERS</footer>

<script>
var GROUP_ID = 610009273;
var PROXY    = 'https://games.roproxy.com';

window.onload = function() {
  loadCCU();
};

function loadCCU() {
  var btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.textContent = '⟳ LOADING...';
  document.getElementById('total-ccu').textContent = '—';
  document.getElementById('ccu-game-count').textContent = 'LOADING';
  document.getElementById('games-grid').innerHTML =
    '<div class="game-card"><div class="game-loading"><span class="spinner"></span> FETCHING GAMES...</div></div>';

  fetch(PROXY + '/v2/groups/' + GROUP_ID + '/games?accessFilter=Public&limit=50&sortOrder=Asc')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var games = d.data || [];
      if (!games.length) { showCCUError('No public games found in this group.'); return; }
      return fetch(PROXY + '/v1/games?universeIds=' + games.map(function(g){return g.id;}).join(','))
        .then(function(r) { return r.json(); })
        .then(function(details) {
          renderGames(games, details.data || []);
        });
    })
    .catch(function(e) {
      showCCUError('Could not connect to Roblox API via proxy.<br>Check your internet connection and try again.');
    })
    .finally(function() {
      btn.disabled = false;
      btn.textContent = '⟳ REFRESH';
      document.getElementById('ccu-updated').textContent =
        'Last updated: ' + new Date().toLocaleTimeString();
    });
}

function renderGames(games, details) {
  var grid = document.getElementById('games-grid');
  grid.innerHTML = '';

  var detMap = {};
  details.forEach(function(d) { detMap[d.id] = d; });

  // Merge game info with details and sort by CCU descending
  var merged = games.map(function(g) {
    var det = detMap[g.id] || {};
    return {
      game: g,
      ccu: det.playing || 0,
      visits: det.visits || 0
    };
  });

  merged.sort(function(a, b) { return b.ccu - a.ccu; });

  var totalCCU = 0;
  var maxCCU = Math.max.apply(null, merged.map(function(m){ return m.ccu; }).concat([1]));

  merged.forEach(function(item, idx) {
    var g = item.game;
    var ccu = item.ccu;
    var visits = item.visits;
    totalCCU += ccu;

    var rank = idx + 1;
    var card = document.createElement('div');
    card.className = 'game-card';
    card.style.animationDelay = (idx * 0.07) + 's';

    var thumbUrl = 'https://thumbnails.roproxy.com/v1/games/icons?universeIds=' + g.id + '&returnPolicy=PlaceHolder&size=150x150&format=Png&isCircular=false';
    var pct = maxCCU > 0 ? Math.round((ccu / maxCCU) * 100) : 0;
    var rankClass = rank <= 3 ? 'game-rank top3' : 'game-rank';

    card.innerHTML =
      '<div class="' + rankClass + '">#' + rank + '</div>'
      + '<img class="game-thumb" src="' + thumbUrl + '" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'" alt="">'
      + '<div class="game-thumb-placeholder" style="display:none">🎮</div>'
      + '<div class="game-name">' + (g.name || 'Unnamed Game') + '</div>'
      + '<div class="game-stats">'
      +   '<div class="game-stat"><span class="game-stat-label">PLAYING NOW</span><span class="game-stat-val">' + fmt(ccu) + '</span></div>'
      +   '<div class="game-stat"><span class="game-stat-label">TOTAL VISITS</span><span class="game-stat-val blue">' + fmtBig(visits) + '</span></div>'
      +   '<div class="game-stat"><span class="game-stat-label">RANK</span><span class="game-stat-val yellow">#' + rank + '</span></div>'
      + '</div>'
      + '<div class="game-ccu-bar"><div class="game-ccu-fill" style="width:' + pct + '%"></div></div>';

    grid.appendChild(card);
  });

  document.getElementById('total-ccu').textContent = fmt(totalCCU);
  document.getElementById('ccu-game-count').textContent = merged.length + ' GAMES';
}

function showCCUError(msg) {
  document.getElementById('games-grid').innerHTML =
    '<div class="ccu-error" style="grid-column:1/-1"><span>⚠</span>' + msg + '</div>';
  document.getElementById('total-ccu').textContent = '—';
  document.getElementById('ccu-game-count').textContent = 'ERROR';
}

function fmt(n) { return new Intl.NumberFormat('en-IN').format(Math.round(n)); }

function fmtBig(n) {
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return String(n);
}
</script>
</body>
</html>
